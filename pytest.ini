[pytest]
testpaths = tests

# Silence third-party DeprecationWarnings we can't fix from here: timm
# (a transitive dep of segmentation-models-pytorch) calls torch.jit.script /
# torch.jit.interface at import time. They're upstream — not our code — and
# clear once smp/timm migrate to torch.compile/export (Tracker issue I-2).
filterwarnings =
    ignore:.*torch.jit.script.*is deprecated.*:DeprecationWarning
    ignore:.*torch.jit.interface.*is deprecated.*:DeprecationWarning
